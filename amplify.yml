version: 1
applications:
  - appRoot: .
    frontend:
      phases:
        preBuild:
          commands:
            - corepack enable
            - corepack prepare pnpm@9.1.4 --activate
            - pnpm install --frozen-lockfile
        build:
          commands:
            - pnpm build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**
          - .next/cache/**
    customHeaders:
      - pattern: /_next/static/*
        headers:
          - key: Cache-Control
            value: public, max-age=31536000, immutable
      - pattern: /public/*
        headers:
          - key: Cache-Control
            value: public, max-age=604800, stale-while-revalidate=86400
      - pattern: /api/upcoming-papers
        headers:
          - key: Cache-Control
            value: s-maxage=60, stale-while-revalidate=120
      - pattern: /api/papers
        headers:
          - key: Cache-Control
            value: s-maxage=60, stale-while-revalidate=120
      - pattern: /api/selected-papers
        headers:
          - key: Cache-Control
            value: s-maxage=60, stale-while-revalidate=120
      - pattern: /api/related-subject
        headers:
          - key: Cache-Control
            value: s-maxage=60, stale-while-revalidate=120
      - pattern: /api/course-list
        headers:
          - key: Cache-Control
            value: s-maxage=60, stale-while-revalidate=120

